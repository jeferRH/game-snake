<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSnake Arcade</title>
    <style>
        :root { --bg-dark: #0d1117; --panel-bg: #161b22; --neon-green: #00ff66; --neon-pink: #ff0055; --text-light: #c9d1d9; }
        body { font-family: sans-serif; background-color: var(--bg-dark); color: var(--text-light); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; max-width: 1100px; width: 100%; margin-top: 20px; }
        .card { background-color: var(--panel-bg); border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        input { width: 100%; background-color: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; margin-bottom: 10px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #238636; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { background-color: #2ea043; }
        canvas { background-color: #05070a; border: 3px solid #30363d; }
        .score-board { display: flex; justify-content: space-around; width: 100%; font-family: monospace; font-size: 18px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-family: monospace; }
        th { border-bottom: 1px solid #30363d; text-align: left; color: var(--neon-green); }
        td { padding: 8px 0; border-bottom: 1px dashed #21262d; }
    </style>
</head>
<body>

    <h1 style="color: var(--neon-green); margin:0;">🐍 CYBERSNAKE ARCADE</h1>
    <p style="color: #8b949e; margin:5px 0 20px 0;">Modo Producción Conectado (Vercel + Render)</p>

    <div class="app-layout">
        <!-- Autenticación -->
        <div class="card">
            <h3 style="color: var(--neon-pink); text-align:center; margin-top:0;">LOGIN</h3>
            <div id="auth-logged-out">
                <input type="text" id="username" placeholder="Usuario">
                <input type="password" id="password" placeholder="Contraseña">
                <button onclick="autenticar('login')">Entrar</button>
                <button onclick="autenticar('register')" style="background-color: #21262d;">Registrarse</button>
            </div>
            <div id="auth-logged-in" style="display: none; text-align: center;">
                <p>Piloto activo: <strong id="user-display" style="color: var(--neon-green)"></strong></p>
                <button onclick="logout()" style="background-color: var(--neon-pink)">Salir</button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="card" style="display: flex; flex-direction: column; align-items: center;">
            <div class="score-board">
                <div>Puntos: <span id="current-score" style="color: var(--neon-green)">0</span></div>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <p style="font-size:12px; color:#8b949e; margin-top:10px;">Inicia sesión, haz clic en el juego y usa las Flechas para moverte.</p>
        </div>

        <!-- Top Puntuaciones -->
        <div class="card">
            <h3 style="margin-top: 0; color: var(--neon-green);">🏆 TOP MUNDIAL</h3>
            <table>
                <thead><tr><th>Piloto</th><th style="text-align:right;">Score</th></tr></thead>
                <tbody id="leaderboard-body"><tr><td colspan="2">Cargando...</td></tr></tbody>
            </table>
        </div>
    </div>

<script>
    // ⚠️ CAMBIA ESTA URL POR LA QUE TE DÉ RENDER CUANDO TU BACKEND ESTÉ LISTO
    let RENDER_API_URL = "https://snake-backend-hfoj.onrender.com/api"; 

    let usuarioLogueado = null;
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 0; let dy = 0; let score = 0;
    let gameInterval = null;

    async function autenticar(tipo) {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        if(!user || !pass) return alert("Completa los campos.");

        try {
            const res = await fetch(`${RENDER_API_URL}/auth/${tipo}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if(data.error) return alert(data.error);
            
            usuarioLogueado = data.user;
            document.getElementById('user-display').innerText = data.user;
            document.getElementById('auth-logged-out').style.display = 'none';
            document.getElementById('auth-logged-in').style.display = 'block';
            resetGame();
        } catch(e) { alert("Error de conexión con el Backend en Render."); }
    }

    function logout() {
        usuarioLogueado = null;
        document.getElementById('auth-logged-out').style.display = 'block';
        document.getElementById('auth-logged-in').style.display = 'none';
        resetGame();
    }

    async function guardarRecord(finalScore) {
        if(!usuarioLogueado) return;
        try {
            await fetch(`${RENDER_API_URL}/scores`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: usuarioLogueado, score: finalScore })
            });
            cargarLeaderboard();
        } catch(e) { console.error(e); }
    }

    async function cargarLeaderboard() {
        const body = document.getElementById('leaderboard-body');
        try {
            const res = await fetch(`${RENDER_API_URL}/scores/leaderboard`);
            const lista = await res.json();
            body.innerHTML = "";
            lista.forEach(item => {
                body.innerHTML += `<tr><td>👤 ${item.username}</td><td style='text-align:right; color:#00ff66;'>${item.score}</td></tr>`;
            });
        } catch(e) { body.innerHTML = "<tr><td colspan='2' style='color:red'>Error de conexión</td></tr>"; }
    }

    function gameLoop() {
        updateSnake();
        if (checkGameOver()) {
            clearInterval(gameInterval); gameInterval = null;
            alert(`Fin del juego. Puntos: ${score}`);
            guardarRecord(score);
            resetGame();
            return;
        }
        drawGame();
    }

    function updateSnake() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        if(dx !== 0 || dy !== 0) {
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) { score += 10; document.getElementById('current-score').innerText = score; generateFood(); } 
            else { snake.pop(); }
        }
    }

    function generateFood() { food.x = Math.floor(Math.random() * tileCount); food.y = Math.floor(Math.random() * tileCount); }
    
    function checkGameOver() {
        if(dx === 0 && dy === 0) return false;
        const head = snake[0];
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
        for (let i = 1; i < snake.length; i++) { if (snake[i].x === head.x && snake[i].y === head.y) return true; }
        return false;
    }

    function drawGame() {
        ctx.fillStyle = "#05070a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ff0055"; ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
        ctx.fillStyle = "#00ff66"; snake.forEach(p => ctx.fillRect(p.x * gridSize + 1, p.y * gridSize + 1, gridSize - 2, gridSize - 2));
    }

    function resetGame() { snake = [{x: 10, y: 10}]; dx = 0; dy = 0; score = 0; document.getElementById('current-score').innerText = score; generateFood(); drawGame(); if(!gameInterval && usuarioLogueado) gameInterval = setInterval(gameLoop, 100); }

    window.addEventListener("keydown", e => {
        if(!usuarioLogueado) return;
        switch (e.key) {
            case "ArrowUp":    if (dy === 0) { dx = 0; dy = -1; } break;
            case "ArrowDown":  if (dy === 0) { dx = 0; dy = 1; } break;
            case "ArrowLeft":  if (dx === 0) { dx = -1; dy = 0; } break;
            case "ArrowRight": if (dx === 0) { dx = 1; dy = 0; } break;
        }
    });

    cargarLeaderboard();
    drawGame();
</script>
</body>
</html>
